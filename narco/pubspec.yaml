name: narco
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  nfc_manager: ^4.2.1
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  permission_handler: ^12.0.3
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  uuid: ^4.5.3
  crypto: ^3.0.7
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  flutter_blue_plus: ^2.3.5
  sqflite: ^2.4.2+1
  hive_flutter: ^1.1.0
  path: ^1.9.0
  json_annotation: ^4.11.0
  audioplayers: ^6.1.0
  google_fonts: ^8.1.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  mockito: ^5.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#F5D161"
  adaptive_icon_foreground: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
